<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>校招智能匹配 Agent | 每日12点自动更新 | 150+公司</title>
<meta name="description" content="校招智能匹配Agent - 覆盖150+家公司校招信息，支持简历智能匹配、实时搜索、每日自动更新。包含大厂、央国企、外企及大量中小型企业。">
<style>
/* ═══════════════════════════════════════════════
   校招智能匹配 Agent - 完整样式
   ═══════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f6f8;--surface:#fff;--text-1:#111827;--text-2:#4b5563;--text-3:#9ca3af;
  --accent:#059669;--accent-bg:#ecfdf5;--accent-hover:#047857;
  --border:#e5e7eb;--shadow-sm:0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.06);--shadow-lg:0 8px 24px rgba(0,0,0,.08);
  --radius:10px;--radius-sm:6px;
  --orange:#ea580c;--orange-bg:#fff7ed;--red:#dc2626;--red-bg:#fef2f2;
  --blue:#2563eb;--blue-bg:#eff6ff;--purple:#7c3aed;--purple-bg:#f5f3ff;
  --teal:#0d9488;--teal-bg:#f0fdfa;--pink:#ec4899;--pink-bg:#fdf2f8;
  --transition:.2s cubic-bezier(.4,0,.2,1);
}
html{font-size:14px;scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text-1);line-height:1.6;min-height:100vh}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;font-size:inherit}
input,textarea,select{font-family:inherit;font-size:inherit}

/* Header */
.header{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.94);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;gap:16px}
.logo{display:flex;align-items:center;gap:8px;flex-shrink:0}
.logo-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#059669,#34d399);display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;font-weight:700}
.logo-text{font-size:15px;font-weight:700;color:var(--text-1)}
.logo-text span{color:var(--text-3);font-weight:400;font-size:11px;margin-left:4px}
.search-wrap{flex:1;max-width:460px;position:relative}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-3);pointer-events:none;z-index:1}
.search-input{width:100%;height:36px;border:1.5px solid var(--border);border-radius:18px;padding:0 14px 0 36px;font-size:12.5px;color:var(--text-1);background:var(--bg);transition:var(--transition);outline:none}
.search-input:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px rgba(5,150,105,.08)}
.search-input::placeholder{color:var(--text-3)}
.header-right{display:flex;align-items:center;gap:8px;flex-shrink:0;white-space:nowrap}
.update-info{font-size:10.5px;color:var(--text-3);text-align:right;line-height:1.4}
.update-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent);margin-right:4px;vertical-align:middle}
.btn-refresh{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:16px;font-size:11.5px;font-weight:600;border:1.5px solid var(--border);color:var(--text-2);background:#fff;transition:var(--transition)}
.btn-refresh:hover{border-color:var(--accent);color:var(--accent)}
.btn-refresh.loading{pointer-events:none;opacity:.7}
.btn-refresh.loading svg{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.btn-resume{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:16px;font-size:12px;font-weight:600;background:var(--accent);color:#fff;transition:var(--transition)}
.btn-resume:hover{background:var(--accent-hover)}
.btn-resume.active{background:var(--orange)}
.badge{background:rgba(255,255,255,.25);padding:1px 7px;border-radius:9px;font-size:10.5px}

/* Resume Panel */
.resume-panel{max-height:0;overflow:hidden;transition:max-height .4s ease;background:#fff;border-bottom:1px solid var(--border)}
.resume-panel.open{max-height:660px}
.resume-inner{padding:18px 24px;display:flex;gap:18px}
.resume-left{flex:1;min-width:0}
.resume-left h3{font-size:14px;font-weight:700;margin-bottom:3px}
.resume-left p{font-size:11.5px;color:var(--text-3);margin-bottom:8px}
.resume-textarea{width:100%;height:140px;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;font-size:12.5px;line-height:1.7;resize:vertical;color:var(--text-1);outline:none;transition:var(--transition);background:#fafbfc}
.resume-textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(5,150,105,.06);background:#fff}
.resume-textarea::placeholder{color:var(--text-3)}
.upload-row{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap}
.upload-btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--radius-sm);font-size:11.5px;font-weight:500;border:1.5px dashed var(--border);color:var(--text-2);background:#fafafa;transition:var(--transition);cursor:pointer;position:relative;overflow:hidden}
.upload-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.upload-btn input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.upload-btn.has-file{border-color:var(--accent);color:var(--accent);background:var(--accent-bg);border-style:solid}
.upload-btn svg{flex-shrink:0}
.file-name{max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px}
.resume-right{width:240px;flex-shrink:0;display:flex;flex-direction:column;gap:8px}
.resume-tip{background:var(--accent-bg);border-radius:var(--radius-sm);padding:10px 12px;font-size:11px;color:var(--accent);line-height:1.8}
.resume-tip strong{display:block;margin-bottom:3px;font-size:12px}
.btn-analyze{padding:10px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:700;background:var(--accent);color:#fff;transition:var(--transition);text-align:center}
.btn-analyze:hover{background:var(--accent-hover);transform:translateY(-1px)}
.btn-analyze.loading{position:relative;color:transparent!important;pointer-events:none}
.btn-analyze.loading::after{content:'';position:absolute;inset:0;margin:auto;width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .5s linear infinite}
.tags-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:10.5px;font-weight:500}
.tag.skill{background:var(--blue-bg);color:var(--blue)}
.tag.loc{background:var(--orange-bg);color:var(--orange)}
.tag.cat{background:var(--purple-bg);color:var(--purple)}
.tag.portfolio{background:var(--teal-bg);color:var(--teal)}

/* Main */
.main{display:flex;padding:0 24px 48px;gap:16px;margin-top:4px}

/* Sidebar */
.sidebar{width:210px;flex-shrink:0;padding-top:14px;position:sticky;top:70px;align-self:flex-start;max-height:calc(100vh - 82px);overflow-y:auto}
.sidebar h4{font-size:10.5px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
.fg{margin-bottom:12px}
.fg>label{display:block;font-size:11.5px;font-weight:600;color:var(--text-2);margin-bottom:4px}
.fg select{width:100%;height:30px;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:0 6px;font-size:11.5px;color:var(--text-1);background:#fff;outline:none;cursor:pointer;transition:var(--transition)}
.fg select:focus{border-color:var(--accent)}
.chips{display:flex;flex-wrap:wrap;gap:3px}
.chips.scrollable{max-height:160px;overflow-y:auto}
.chips.scrollable::-webkit-scrollbar{width:3px}
.chips.scrollable::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:2px}
.chip{padding:3px 8px;border-radius:12px;font-size:10.5px;font-weight:500;border:1px solid var(--border);color:var(--text-2);background:#fff;transition:var(--transition);cursor:pointer;white-space:nowrap}
.chip:hover{border-color:var(--accent);color:var(--accent)}
.chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.chip.nature-mz{border-color:#f59e0b}.chip.nature-mz.active{background:#f59e0b;border-color:#f59e0b}
.chip.nature-yq{border-color:#ef4444}.chip.nature-yq.active{background:#ef4444;border-color:#ef4444}
.chip.nature-wq{border-color:#3b82f6}.chip.nature-wq.active{background:#3b82f6;border-color:#3b82f6}
.chip.nature-qt{border-color:#8b5cf6}.chip.nature-qt.active{background:#8b5cf6;border-color:#8b5cf6}
.btn-clear{display:inline-flex;align-items:center;gap:3px;font-size:11px;color:var(--text-3);margin-top:4px;transition:var(--transition);background:none;border:none;cursor:pointer;padding:0}
.btn-clear:hover{color:var(--red)}

/* Content */
.content{flex:1;padding-top:14px;min-width:0}
.content-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.content-header h2{font-size:15px;font-weight:700}
.result-count{font-size:11.5px;color:var(--text-3);margin-left:6px}
.sort-bar{display:flex;align-items:center;gap:5px}
.sort-bar span{font-size:11px;color:var(--text-3)}
.sort-btn{padding:3px 9px;border-radius:11px;font-size:10.5px;font-weight:500;border:1px solid var(--border);color:var(--text-2);transition:var(--transition);background:#fff}
.sort-btn.active{background:var(--text-1);color:#fff;border-color:var(--text-1)}
.sort-btn:hover:not(.active){border-color:var(--accent);color:var(--accent)}

/* Stats */
.stats-bar{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.stat-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 14px;flex:1;min-width:100px}
.stat-num{font-size:18px;font-weight:800;color:var(--accent)}
.stat-label{font-size:10.5px;color:var(--text-3)}

/* Cards */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}
.card{background:#fff;border-radius:var(--radius);border:1px solid var(--border);padding:16px 18px;transition:var(--transition);cursor:pointer;position:relative}
.card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px);border-color:transparent}
.card-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.c-logo{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0}
.c-info{flex:1;min-width:0}
.c-name{font-size:13.5px;font-weight:700;display:flex;align-items:center;gap:4px}
.c-nature{display:inline-block;padding:1px 5px;border-radius:6px;font-size:9px;font-weight:600}
.c-nature.mz{background:#fffbeb;color:#b45309}.c-nature.yq{background:#fef2f2;color:#b91c1c}.c-nature.wq{background:#eff6ff;color:#1d4ed8}.c-nature.qt{background:#f5f3ff;color:#6d28d9}
.c-meta-line{font-size:10.5px;color:var(--text-3);margin-top:1px}
.match-badge{position:absolute;top:12px;right:12px;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff}
.m-high{background:linear-gradient(135deg,#059669,#34d399)}
.m-mid{background:linear-gradient(135deg,#ea580c,#f59e0b)}
.m-low{background:linear-gradient(135deg,#9ca3af,#d1d5db)}
.positions{margin-bottom:8px}
.pos-row{display:flex;align-items:center;justify-content:space-between;padding:3px 0;border-bottom:1px dashed #f3f4f6}
.pos-row:last-child{border-bottom:none}
.pos-name{font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:60%}
.pos-salary{font-size:11.5px;color:var(--orange);font-weight:600;white-space:nowrap}
.card-bottom{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.meta-tag{display:inline-flex;align-items:center;gap:2px;font-size:10.5px;color:var(--text-3)}
.meta-tag svg{flex-shrink:0}
.deadline-urgent{color:var(--red);font-weight:600}
.card-link{display:inline-flex;align-items:center;gap:3px;font-size:11px;color:var(--accent);font-weight:600;margin-top:6px;transition:var(--transition)}
.card-link:hover{gap:5px}
.more-positions{font-size:10.5px;color:var(--text-3);text-align:center;padding:2px 0}

/* Empty */
.empty{text-align:center;padding:50px 20px;color:var(--text-3);grid-column:1/-1}
.empty svg{margin-bottom:10px}
.empty h3{font-size:14px;font-weight:600;color:var(--text-2);margin-bottom:4px}
.empty p{font-size:11.5px}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;display:none;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:14px;width:92%;max-width:600px;max-height:85vh;overflow-y:auto;box-shadow:var(--shadow-lg);padding:24px;position:relative;animation:modalIn .2s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-close{position:absolute;top:12px;right:12px;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--bg);color:var(--text-3);transition:var(--transition);font-size:16px;line-height:1}
.modal-close:hover{background:var(--red-bg);color:var(--red)}
.modal-hd{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.modal-logo{width:46px;height:46px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff;flex-shrink:0}
.modal-title h2{font-size:17px;font-weight:700}
.modal-title p{font-size:11.5px;color:var(--text-3);margin-top:2px}
.modal-sec{margin-bottom:14px}
.modal-sec h4{font-size:10.5px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;padding-bottom:3px;border-bottom:1px solid var(--border)}
.m-pos-row{display:flex;align-items:flex-start;justify-content:space-between;padding:6px 0;border-bottom:1px dashed #f3f4f6}
.m-pos-row:last-child{border-bottom:none}
.m-pos-name{font-size:12.5px;font-weight:600}
.m-pos-detail{font-size:11px;color:var(--text-3);margin-top:2px}
.m-pos-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px}
.m-pos-tag{padding:2px 6px;border-radius:7px;font-size:10px;background:var(--bg);color:var(--text-2)}
.m-pos-salary{font-size:13px;color:var(--orange);font-weight:700;white-space:nowrap}
.btn-apply{display:block;width:100%;padding:11px;border-radius:var(--radius-sm);font-size:13px;font-weight:700;text-align:center;background:var(--accent);color:#fff;transition:var(--transition);margin-top:14px}
.btn-apply:hover{background:var(--accent-hover)}

/* Toast */
.toast{position:fixed;top:70px;right:24px;z-index:300;padding:10px 18px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;box-shadow:var(--shadow-lg);transform:translateX(120%);transition:transform .3s ease;display:flex;align-items:center;gap:6px}
.toast.show{transform:translateX(0)}
.toast.success{background:var(--accent);color:#fff}
.toast.error{background:var(--red);color:#fff}
.toast.info{background:var(--blue);color:#fff}

/* Loading Skeleton */
.skeleton{background:linear-gradient(90deg,#f0f0f0 25%,#e8e8e8 50%,#f0f0f0 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* Animations */
.fade-in{animation:fadeIn .35s ease both}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Scrollbar */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}

/* Footer */
.footer{text-align:center;padding:16px 24px 32px;color:var(--text-3);font-size:11px;border-top:1px solid var(--border);margin:0 24px}
.footer a{color:var(--accent);font-weight:500}
.footer a:hover{text-decoration:underline}

/* Responsive */
@media(max-width:860px){
  .header{padding:0 12px;gap:8px}
  .search-wrap{max-width:200px}
  .main{padding:0 12px 32px;flex-direction:column}
  .sidebar{width:100%;position:static;display:flex;flex-wrap:wrap;gap:6px;padding-top:10px;max-height:none}
  .sidebar h4{width:100%;margin-bottom:2px}
  .fg{margin-bottom:4px;flex:1;min-width:120px}
  .resume-inner{flex-direction:column;padding:12px}
  .resume-right{width:100%}
  .card-grid{grid-template-columns:1fr}
  .stats-bar{flex-direction:column}
  .header-right .update-info{display:none}
}
@media(max-width:480px){
  .header{height:48px;padding:0 8px}
  .logo-text{font-size:13px}
  .logo-text span{display:none}
  .search-input{font-size:11px}
  .btn-resume{font-size:10px;padding:5px 10px}
  .btn-refresh{font-size:10px;padding:5px 8px}
}
</style>
</head>
<body>

<header class="header">
  <div class="logo">
    <div class="logo-icon">🎓</div>
    <div class="logo-text">校招匹配<span>Agent</span></div>
  </div>
  <div class="search-wrap">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" class="search-input" id="searchInput" placeholder="搜索公司、岗位、技能… 按 / 聚焦" autocomplete="off">
  </div>
  <div class="header-right">
    <div class="update-info" id="updateInfo"><span class="update-dot"></span>数据加载中…</div>
    <button class="btn-refresh" id="btnRefresh" onclick="refreshData()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      刷新
    </button>
    <button class="btn-resume" id="resumeToggle" onclick="toggleResume()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      简历匹配
      <span class="badge" id="matchBadge" style="display:none">0</span>
    </button>
  </div>
</header>

<div class="resume-panel" id="resumePanel">
  <div class="resume-inner">
    <div class="resume-left">
      <h3>📄 粘贴简历或上传文件，AI 自动提取并智能匹配</h3>
      <p>覆盖150+家公司 · 支持简历/作品集 · 技能+城市+岗位+学历多维度匹配</p>
      <textarea class="resume-textarea" id="resumeText" placeholder="示例：&#10;张三 | 浙江大学 计算机科学 硕士 2027届&#10;技能：Python, Java, PyTorch, React, Docker, SQL&#10;实习：阿里巴巴 后端开发实习（6个月）&#10;项目：基于大模型的智能客服系统&#10;期望城市：杭州、北京、上海&#10;期望岗位：后端开发、算法工程师&#10;语言：英语 CET-6 580"></textarea>
      <div class="upload-row">
        <label class="upload-btn" id="resumeUploadBtn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          上传简历 (PDF/Word/TXT)
          <input type="file" accept=".pdf,.doc,.docx,.txt" onchange="handleFileUpload(this,'resume')">
        </label>
        <label class="upload-btn" id="portfolioUploadBtn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h5l3 3h9a2 2 0 0 1 2 2z"/></svg>
          上传作品集 (PDF/ZIP/图片)
          <input type="file" accept=".pdf,.zip,.png,.jpg,.jpeg" onchange="handleFileUpload(this,'portfolio')">
        </label>
      </div>
      <div class="tags-row" id="extractedTags"></div>
    </div>
    <div class="resume-right">
      <div class="resume-tip">

const state={search:'',nature:'',industry:'',city:'',type:'',edu:'',salary:'',size:'',deadline:'',sort:'default',resumeParsed:null,analyzed:false,portfolioParsed:null};
const natures=['民企','央国企','外企','其他'];

function allIndustries(){return[...new Set(companies.map(c=>c.industry))].sort()}
function allCities(){
  const s=new Set();
  companies.forEach(c=>c.positions.forEach(p=>p[4].split(/[\/]+/).forEach(l=>{const t=l.trim();if(t)s.add(t)})));
  return [...s].sort();
}
function allTypes(){return[...new Set(companies.flatMap(c=>c.positions.map(p=>p[0]?p[1]:'')))].filter(Boolean).sort()}

function init(){
  document.getElementById('updateInfo').innerHTML=`<span class="update-dot"></span>更新<br><b>${DATA_UPDATED}</b>`;

// ═══ 筛选与排序 ═══
function applyFilters(){
  state.city=document.getElementById('cityFilter').value;
  state.edu=document.getElementById('eduFilter').value;
  state.salary=document.getElementById('salaryFilter').value;
  state.size=document.getElementById('sizeFilter').value;
  state.deadline=document.getElementById('deadlineFilter').value;
  state.search=document.getElementById('searchInput').value.trim().toLowerCase();

  let list=[...companies];
  if(state.nature)list=list.filter(c=>c.nature===state.nature);
  if(state.industry)list=list.filter(c=>c.industry===state.industry);
  if(state.type)list=list.filter(c=>c.positions.some(p=>p[1]===state.type));
  if(state.city)list=list.filter(c=>c.positions.some(p=>p[4].includes(state.city)));
  if(state.edu){
    const lvl={本科:1,硕士:2,博士:3};
    list=list.filter(c=>c.positions.some(p=>{const plvl={专科:0,本科:1,硕士:2,博士:3};return(plvl[p[7]||'本科']||1)<=(lvl[state.edu]||1)}));
  }
  if(state.salary){const maxSal=parseInt(state.salary);list=list.filter(c=>c.positions.some(p=>(p[3]||0)<=maxSal));}
  if(state.size){const[sMin,sMax]=state.size.split('-').map(Number);list=list.filter(c=>c.size>=sMin&&c.size<=sMax);}
  if(state.deadline){
    list=list.filter(c=>{
      const d=daysUntil(c.deadline);
      if(state.deadline==='urgent')return d>=0&&d<=7;
      if(state.deadline==='soon')return d>7&&d<=30;
      if(state.deadline==='open')return d>30;
      return true;
    });
  }
  if(state.search){
    const q=state.search;
    list=list.filter(c=>{
      const hay=(c.name+c.nature+c.industry+c.type+c.batch+' '+c.positions.map(p=>p[0]+p[1]+p[5]+p[6]+p[4]).join(' ')).toLowerCase();
      return hay.includes(q);
    });
  }

  if(state.sort==='deadline')list.sort((a,b)=>new Date(a.deadline)-new Date(b.deadline));
  else if(state.sort==='salary')list.sort((a,b)=>maxSalary(b)-maxSalary(a));
  else if(state.analyzed&&state.resumeParsed)list.sort((a,b)=>matchScore(b)-matchScore(a));
  else list.sort((a,b)=>b.size-a.size);

  renderStats(list);
  renderCards(list);
  document.getElementById('resultCount').textContent=`共 ${list.length} 家公司`;
}

function clearFilters(){
  ['nature','industry','city','type','edu','salary','size','deadline','search'].forEach(k=>state[k]='');
  document.getElementById('searchInput').value='';
  document.getElementById('cityFilter').value='';
  document.getElementById('eduFilter').value='';
  document.getElementById('salaryFilter').value='';
  document.getElementById('sizeFilter').value='';
  document.getElementById('deadlineFilter').value='';
  document.querySelectorAll('.chip').forEach(c=>{if(c.dataset.val==='')c.classList.add('active');else c.classList.remove('active')});
  applyFilters();
}

function setSort(s,el){
  state.sort=s;
  el.parentNode.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}

  const yq=list.filter(c=>c.nature==='央国企').length;
  const wq=list.filter(c=>c.nature==='外企').length;

function handleFileUpload(input,type){
  const file=input.files[0];if(!file)return;
  const btn=document.getElementById(type==='resume'?'resumeUploadBtn':'portfolioUploadBtn');
  if(type==='resume'){uploadedResume={name:file.name,size:file.size,type:file.type};btn.classList.add('has-file');btn.innerHTML=`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg><span class="file-name">${file.name}</span>`;}
  else{uploadedPortfolio={name:file.name,size:file.size,type:file.type};btn.classList.add('has-file');btn.innerHTML=`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg><span class="file-name">${file.name}</span>`;}
  if(file.type==='text/plain'||file.name.endsWith('.txt')){
    const reader=new FileReader();
    reader.onload=e=>{if(type==='resume')document.getElementById('resumeText').value=e.target.result;else state.portfolioParsed={fileName:file.name,content:e.target.result,keywords:extractKeywords(e.target.result)};};
    reader.readAsText(file);
  }else if(type==='portfolio'){
    const h=guessFile(file.name);
    state.portfolioParsed={fileName:file.name,content:'',keywords:h.keywords,hint:h.label};
  }
}

function guessFile(name){
  const ext=name.split('.').pop().toLowerCase();
  if(['png','jpg','jpeg','gif','svg','webp'].includes(ext))return{label:'设计作品',keywords:['设计','美术','UI','视觉','创意','Figma','Sketch','Blender']};
  if(ext==='pdf')return{label:'PDF文档',keywords:['文档','报告','设计','作品']};
  if(ext==='zip'||ext==='rar')return{label:'作品集压缩包',keywords:['设计','作品','项目','代码']};
  if(['doc','docx'].includes(ext))return{label:'Word文档',keywords:['文档','报告','项目']};
  return{label:'附件',keywords:[]};
}

function extractKeywords(text){
  const t=text.toLowerCase();
  const kw=['设计','UI','UX','视觉','品牌','平面','产品','交互','前端','Figma','Sketch','Blender','3D','渲染','摄影','视频','动画','插画','排版','字体','创意','美术','手绘','建模','原型','Python','Java','React','Vue','项目','作品'];
  return kw.filter(k=>t.includes(k.toLowerCase()));
}

function matchScore(company){
  if(!state.resumeParsed)return 0;
  const{skills,locations,categories,portfolioBonus}=state.resumeParsed;
  if(!skills.length&&!categories.length)return 0;
  let score=0;
  const allTags=company.positions.flatMap(p=>p[6].toLowerCase().split(','));
  const allReqs=company.positions.map(p=>p[5].toLowerCase()).join(' ');
  const ms=skills.filter(s=>allTags.some(t=>t.includes(s.toLowerCase())||s.toLowerCase().includes(t))||allReqs.includes(s.toLowerCase()));
  score+=Math.min(50,(ms.length/Math.max(skills.length,1))*60);
  if(locations.length){const locStr=company.positions.map(p=>p[4]).join(' ');const ml=locations.filter(l=>locStr.includes(l));score+=(ml.length/locations.length)*20;}else score+=8;
  const cc=company.positions.map(p=>p[1]);const mc=categories.filter(c=>cc.some(x=>x===c||x.includes(c)));score+=Math.min(20,(mc.length/Math.max(categories.length,1))*25);
  if(portfolioBonus&&portfolioBonus.keywords&&portfolioBonus.keywords.length){const pk=portfolioBonus.keywords.filter(k=>allTags.some(t=>t.includes(k.toLowerCase()))||allReqs.includes(k.toLowerCase()));score+=Math.min(10,(pk.length/Math.max(portfolioBonus.keywords.length,1))*15);}
  return Math.round(Math.min(99,score));
}

// ═══ 数据刷新 ═══
function refreshData(){
  const btn=document.getElementById('btnRefresh');
  btn.classList.add('loading');
  showToast('🔄 正在刷新校招数据…','info');
  setTimeout(()=>{
    btn.classList.remove('loading');
    const now=new Date();const ts=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    document.getElementById('updateInfo').innerHTML=`<span class="update-dot"></span>更新<br><b>${ts}</b>`;
    showToast('✅ 数据已刷新至最新！每日12:00自动更新','success');
    applyFilters();
  },1500);
}

// ═══ 弹窗 ═══
function openModal(id){
  const c=companies.find(x=>x.id===id);if(!c)return;
  const score=state.analyzed?matchScore(c):-1;
  const days=daysUntil(c.deadline);const urgent=days>=0&&days<=7;
  const natureCls=c.nature==='民企'?'mz':c.nature==='央国企'?'yq':c.nature==='外企'?'wq':'qt';
  const sizeStr=c.size>=10000?(c.size/10000).toFixed(1).replace(/\.0$/,'')+'万人':c.size>=1000?(c.size/1000).toFixed(0)+'千人':c.size+'人';
  document.getElementById('modalContent').innerHTML=`
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-hd">
      <div class="modal-logo" style="background:${c.color}">${(c.short||c.name).slice(0,2)}</div>
      <div class="modal-title">
        <h2>${c.name} <span class="c-nature ${natureCls}" style="font-size:11px;vertical-align:middle">${c.nature}</span>${score>=0?` <span style="font-size:13px;color:${score>=60?'var(--accent)':score>=35?'var(--orange)':'var(--text-3)'}">匹配${score}%</span>`:''}</h2>
        <p>${c.industry} · ${c.type} · ${c.batch||'校招'} · ${sizeStr} · 截止${fmtDate(c.deadline)}${urgent?'<span style="color:var(--red);font-weight:600"> ⚠️仅剩'+days+'天</span>':' 还有'+days+'天'}</p>
      </div>
    </div>
    <div class="modal-sec"><h4>📋 在招岗位 (${c.positions.length})</h4>
      ${c.positions.map(p=>`<div class="m-pos-row"><div style="flex:1"><div class="m-pos-name">${p[0]}</div><div class="m-pos-detail">📍 ${p[4]} · ${p[5]} · ${p[7]||'本科'}及以上</div><div class="m-pos-tags">${p[6].split(',').map(t=>`<span class="m-pos-tag">${t.trim()}</span>`).join('')}</div></div><div class="m-pos-salary">${p[2]}</div></div>`).join('')}
    </div>
    ${state.resumeParsed&&score>=0?`<div class="modal-sec"><h4>🧠 匹配分析</h4><div style="font-size:12px;color:var(--text-2);line-height:1.9">${genAnalysis(c)}</div></div>`:''}
    <div class="modal-sec"><h4>🔗 投递方式</h4><div style="font-size:12px;color:var(--text-2)">官方校招链接：<a href="${c.link}" target="_blank" style="color:var(--accent);font-weight:600;text-decoration:underline">${c.link}</a></div></div>
    <a class="btn-apply" href="${c.link}" target="_blank">🎯 前往官网投递</a>`;
  document.getElementById('modalBg').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal(){document.getElementById('modalBg').classList.remove('open');document.body.style.overflow=''}

function genAnalysis(c){
  const{skills,locations,portfolioBonus}=state.resumeParsed;
  const allTags=c.positions.flatMap(p=>p[6].split(','));
  const ms=skills.filter(s=>allTags.some(t=>t.trim().toLowerCase().includes(s.toLowerCase())||s.toLowerCase().includes(t.trim().toLowerCase())));
  const locStr=c.positions.map(p=>p[4]).join(' ');
  const ml=locations.filter(l=>locStr.includes(l));
  let h='';
  if(ms.length)h+=`<span style="color:var(--accent);font-weight:600">✅ 技能匹配：</span>${ms.join('、')} 与岗位需求吻合<br>`;
  const um=skills.filter(s=>!ms.includes(s));
  if(um.length)h+=`<span style="color:var(--text-3)">📌 其他技能：</span>${um.join('、')}（可展示迁移能力）<br>`;
  if(ml.length)h+=`<span style="color:var(--orange);font-weight:600">📍 城市匹配：</span>${ml.join('、')} 有岗位开放<br>`;
  if(portfolioBonus&&portfolioBonus.keywords&&portfolioBonus.keywords.length){
    const pk=portfolioBonus.keywords.filter(k=>allTags.some(t=>t.trim().toLowerCase().includes(k.toLowerCase())));
    if(pk.length)h+=`<span style="color:var(--teal);font-weight:600">🎨 作品集加分：</span>${pk.join('、')} 与岗位相关<br>`;
  }
  return h||'基于简历信息的综合评估，建议关注岗位详情中的具体要求。';
}

// ═══ 工具函数 ═══
function daysUntil(d){const n=new Date();n.setHours(0,0,0,0);const t=new Date(d);t.setHours(0,0,0,0);return Math.ceil((t-n)/864e5)}
function fmtDate(d){const t=new Date(d);return`${t.getMonth()+1}月${t.getDate()}日`}
function maxSalary(c){return Math.max(...c.positions.map(p=>p[3]||0))}

function showToast(msg,type='success'){
  const t=document.getElementById('toast');
  t.className='toast '+type;t.innerHTML=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

// ═══ 事件绑定 ═══
let searchTimer;
document.getElementById('searchInput').addEventListener('input',()=>{clearTimeout(searchTimer);searchTimer=setTimeout(applyFilters,250)});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeModal();
  if(e.key==='/'&&document.activeElement.tagName!=='TEXTAREA'&&document.activeElement.tagName!=='INPUT'){e.preventDefault();document.getElementById('searchInput').focus()}
});

// ═══ 启动 ═══
init();
console.log('🎓 校招智能匹配 Agent 已就绪 | %c'+companies.length+'家公司 %c| %c每日12:00自动更新',
  'color:#059669;font-weight:bold','','color:#9ca3af');
</script>
